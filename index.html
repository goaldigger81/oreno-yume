<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오레노유메 (俺の夢) - 이자카야</title>
  <link href='/style.css' rel='stylesheet'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-theme="dark">
  <header>
    <div class="header-content">
      <div class="logo">오레노유메 <span class="sub-logo">俺の夢</span></div>
      <button id="themeToggle" class="theme-toggle-mini"><i class="fas fa-moon"></i></button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-text">
        <h1>꿈을 담은 공간, 오레노유메</h1>
        <p>최고의 재료와 정성으로 모시는 프리미엄 이자카야</p>
      </div>
    </section>

    <section class="branches">
      <div class="branch-card">
        <div class="branch-info">
          <h2>선릉본점</h2>
          <p class="address"><i class="fas fa-map-marker-alt"></i> 서울 강남구 테헤란로51길 7 수지빌딩 2층</p>
          <p class="description">전통과 현대가 어우러진 오레노유메의 시작점</p>
          <a href="https://map.naver.com/v5/entry/place/37841241" target="_blank" class="naver-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b1/Naver_Logotype.svg" alt="Naver" class="naver-logo"> 네이버 예약/플레이스
          </a>
        </div>
      </div>

      <div class="branch-card">
        <div class="branch-info">
          <h2>신사점</h2>
          <p class="address"><i class="fas fa-map-marker-alt"></i> 서울 강남구 압구정로2길 59</p>
          <p class="description">트렌디한 감각과 깊은 맛이 공존하는 신사동 핫플레이스</p>
          <a href="https://map.naver.com/v5/entry/place/116141241" target="_blank" class="naver-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b1/Naver_Logotype.svg" alt="Naver" class="naver-logo"> 네이버 예약/플레이스
          </a>
        </div>
      </div>

      <div class="branch-card">
        <div class="branch-info">
          <h2>강남역점</h2>
          <p class="address"><i class="fas fa-map-marker-alt"></i> 서울 강남구 역삼로3길 19 2층</p>
          <p class="description">도심 속 여유로운 휴식과 진한 사케 한 잔의 즐거움</p>
          <a href="https://map.naver.com/v5/entry/place/13361241" target="_blank" class="naver-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b1/Naver_Logotype.svg" alt="Naver" class="naver-logo"> 네이버 예약/플레이스
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 오레노유메. All Rights Reserved.</p>
  </footer>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
